name: Create Release on Tag

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'
jobs:
  create-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Download artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download 25115880043 -n "Upload libs"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release create ${{ github.ref_name }} \
            "Upload libs"
