name: Create Release on Tag

on:
  workflow_dispatch: 
  push:
    tags:
      - 'v*'
jobs:
  create-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Download artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # if we don't specify a workflow run then it download command will download the latest artifact created
        run: gh run download -n java_libs
        # run: gh run download 25118041273 -n java_libs
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release create ${{ github.ref_name }} ./StockLib-0.1.0.jar
            
